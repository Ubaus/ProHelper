name: Build TurboFPS Fabric 26.2

on:
  push:
    branches: [ main ]
    paths:
      - 'turbofps_good_parts/**'
      - '.github/workflows/build-turbofps.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'turbofps_good_parts/**'
      - '.github/workflows/build-turbofps.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Reconstruct source archive
        run: |
          cat turbofps_good_parts/00 turbofps_good_parts/01 turbofps_good_parts/02 turbofps_good_parts/03 | base64 --decode > /tmp/turbofps.zip
          unzip -t /tmp/turbofps.zip
          rm -rf build-src
          mkdir build-src
          unzip -q /tmp/turbofps.zip -d build-src
          sed -i 's/protected void init()/public void init()/g' build-src/src/client/java/com/daniel/turbofps/client/screen/TurboVideoSettingsScreen.java

      - name: Build Fabric mod
        working-directory: build-src
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean build

      - name: Select production JAR
        run: |
          mkdir -p dist
          JAR=$(find build-src/build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' | head -n 1)
          test -n "$JAR"
          cp "$JAR" dist/turbofps-1.0.0.jar
          sha256sum dist/turbofps-1.0.0.jar > dist/turbofps-1.0.0.jar.sha256

      - name: Commit compiled JAR
        if: github.event_name == 'push'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add dist/turbofps-1.0.0.jar dist/turbofps-1.0.0.jar.sha256
          git diff --cached --quiet && exit 0
          git commit -m 'Build TurboFPS Fabric 26.2 JAR'
          git push

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: turbofps-1.0.0
          path: |
            dist/turbofps-1.0.0.jar
            dist/turbofps-1.0.0.jar.sha256
